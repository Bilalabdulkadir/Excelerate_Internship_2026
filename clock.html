<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock - Multiple Time Zones</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .clocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }

    .clock-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .clock-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
    }

    .clock-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .clock-timezone {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .clock-display {
      font-size: 2.5rem;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      color: #667eea;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .clock-ampm {
      font-size: 1.2rem;
      font-weight: 600;
      color: #764ba2;
      text-transform: uppercase;
    }

    .analog-clock {
      width: 150px;
      height: 150px;
      margin: 15px auto;
      position: relative;
      background: #f0f0f0;
      border-radius: 50%;
      border: 4px solid #667eea;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .analog-clock::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: #667eea;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 10px;
    }

    .hand.hour {
      width: 6px;
      height: 35px;
      background: #667eea;
      margin-left: -3px;
    }

    .hand.minute {
      width: 4px;
      height: 45px;
      background: #764ba2;
      margin-left: -2px;
    }

    .hand.second {
      width: 2px;
      height: 50px;
      background: #ff6b6b;
      margin-left: -1px;
    }

    .controls {
      text-align: center;
      margin-top: 30px;
    }

    .add-timezone-btn {
      background: white;
      color: #667eea;
      border: none;
      padding: 12px 25px;
      font-size: 1rem;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .add-timezone-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .add-timezone-btn:active {
      transform: translateY(0);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 90%;
    }

    .modal-content h2 {
      color: #333;
      margin-bottom: 20px;
    }

    .timezone-select {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-bottom: 15px;
      font-family: inherit;
    }

    .timezone-select:focus {
      outline: none;
      border-color: #667eea;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .remove-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s ease;
    }

    .remove-btn:hover {
      background: #ff5252;
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .clock-display {
        font-size: 2rem;
      }

      .clocks-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 15px;
      color: #999;
    }

    .empty-state p {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🕐 Global Time Zone Clock</h1>
      <p>Track time across the world in real-time</p>
    </div>

    <div class="clocks-grid" id="clocksContainer">
      <!-- Clocks will be dynamically generated here -->
    </div>

    <div class="controls">
      <button class="add-timezone-btn" onclick="openModal()">+ Add Time Zone</button>
    </div>
  </div>

  <!-- Modal for adding timezone -->
  <div class="modal" id="timezoneModal">
    <div class="modal-content">
      <h2>Add Time Zone</h2>
      <select class="timezone-select" id="timezoneSelect">
        <option value="">Select a timezone...</option>
      </select>
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addTimezone()">Add</button>
      </div>
    </div>
  </div>

  <script>
    // Default timezones to display
    const defaultTimezones = [
      { name: 'New York', timezone: 'America/New_York' },
      { name: 'London', timezone: 'Europe/London' },
      { name: 'Tokyo', timezone: 'Asia/Tokyo' }
    ];

    // Comprehensive list of timezones
    const allTimezones = [
      { name: 'New York', timezone: 'America/New_York' },
      { name: 'Los Angeles', timezone: 'America/Los_Angeles' },
      { name: 'Chicago', timezone: 'America/Chicago' },
      { name: 'Denver', timezone: 'America/Denver' },
      { name: 'Toronto', timezone: 'America/Toronto' },
      { name: 'Mexico City', timezone: 'America/Mexico_City' },
      { name: 'São Paulo', timezone: 'America/Sao_Paulo' },
      { name: 'London', timezone: 'Europe/London' },
      { name: 'Paris', timezone: 'Europe/Paris' },
      { name: 'Berlin', timezone: 'Europe/Berlin' },
      { name: 'Moscow', timezone: 'Europe/Moscow' },
      { name: 'Dubai', timezone: 'Asia/Dubai' },
      { name: 'Delhi', timezone: 'Asia/Kolkata' },
      { name: 'Bangkok', timezone: 'Asia/Bangkok' },
      { name: 'Hong Kong', timezone: 'Asia/Hong_Kong' },
      { name: 'Shanghai', timezone: 'Asia/Shanghai' },
      { name: 'Tokyo', timezone: 'Asia/Tokyo' },
      { name: 'Sydney', timezone: 'Australia/Sydney' },
      { name: 'Auckland', timezone: 'Pacific/Auckland' },
      { name: 'Singapore', timezone: 'Asia/Singapore' },
      { name: 'Istanbul', timezone: 'Europe/Istanbul' },
      { name: 'Cairo', timezone: 'Africa/Cairo' },
      { name: 'Johannesburg', timezone: 'Africa/Johannesburg' },
      { name: 'Lagos', timezone: 'Africa/Lagos' }
    ];

    let timezones = defaultTimezones;

    // Initialize timezone select dropdown
    function initializeTimezoneSelect() {
      const select = document.getElementById('timezoneSelect');
      allTimezones.forEach(tz => {
        const option = document.createElement('option');
        option.value = tz.timezone;
        option.textContent = `${tz.name} (${tz.timezone})`;
        select.appendChild(option);
      });
    }

    // Open modal
    function openModal() {
      document.getElementById('timezoneModal').classList.add('active');
    }

    // Close modal
    function closeModal() {
      document.getElementById('timezoneModal').classList.remove('active');
      document.getElementById('timezoneSelect').value = '';
    }

    // Add timezone
    function addTimezone() {
      const select = document.getElementById('timezoneSelect');
      const timezone = select.value;

      if (!timezone) {
        alert('Please select a timezone');
        return;
      }

      const tzObj = allTimezones.find(tz => tz.timezone === timezone);
      if (tzObj && !timezones.find(t => t.timezone === timezone)) {
        timezones.push(tzObj);
        updateClocks();
        closeModal();
      }
    }

    // Remove timezone
    function removeTimezone(timezone) {
      if (timezones.length > 1) {
        timezones = timezones.filter(t => t.timezone !== timezone);
        updateClocks();
      } else {
        alert('You must have at least one timezone');
      }
    }

    // Format time for display
    function formatTime(date) {
      return date.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    // Get time in specific timezone
    function getTimeInTimezone(timezone) {
      return new Date(new Date().toLocaleString('en-US', { timeZone: timezone }));
    }

    // Update analog clock hands
    function updateAnalogClock(clockElement, date) {
      const hours = date.getHours() % 12;
      const minutes = date.getMinutes();
      const seconds = date.getSeconds();

      const hourHand = clockElement.querySelector('.hand.hour');
      const minuteHand = clockElement.querySelector('.hand.minute');
      const secondHand = clockElement.querySelector('.hand.second');

      hourHand.style.transform = `rotate(${hours * 30 + minutes * 0.5}deg)`;
      minuteHand.style.transform = `rotate(${minutes * 6 + seconds * 0.1}deg)`;
      secondHand.style.transform = `rotate(${seconds * 6}deg)`;
    }

    // Create clock card
    function createClockCard(tzData) {
      const date = getTimeInTimezone(tzData.timezone);
      const timeString = formatTime(date);
      const ampm = date.getHours() >= 12 ? 'PM' : 'AM';

      const card = document.createElement('div');
      card.className = 'clock-card';
      card.innerHTML = `
        <div class="clock-title">${tzData.name}</div>
        <div class="clock-timezone">${tzData.timezone}</div>
        <div class="analog-clock">
          <div class="hand hour"></div>
          <div class="hand minute"></div>
          <div class="hand second"></div>
        </div>
        <div class="clock-display">${timeString}</div>
        <div class="clock-ampm">${ampm}</div>
        ${timezones.length > 1 ? `<button class="remove-btn" onclick="removeTimezone('${tzData.timezone}')">Remove</button>` : ''}
      `;

      // Update analog clock immediately
      updateAnalogClock(card.querySelector('.analog-clock'), date);

      return card;
    }

    // Update all clocks
    function updateClocks() {
      const container = document.getElementById('clocksContainer');

      if (timezones.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No timezones added. Click "Add Time Zone" to get started!</p></div>';
        return;
      }

      container.innerHTML = '';
      timezones.forEach(tzData => {
        container.appendChild(createClockCard(tzData));
      });
    }

    // Update clocks every second
    function startClock() {
      updateClocks();
      setInterval(updateClocks, 1000);
    }

    // Close modal when clicking outside
    document.addEventListener('click', (e) => {
      const modal = document.getElementById('timezoneModal');
      if (e.target === modal) {
        closeModal();
      }
    });

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      initializeTimezoneSelect();
      startClock();
    });
  </script>
</body>
</html>
