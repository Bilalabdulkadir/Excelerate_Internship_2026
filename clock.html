<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Time — Adama, Ethiopia | Bilal Abdulkadir Muhammed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .clock-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .clock-screen .eyebrow { margin-bottom: 18px; }
  .big-clock {
    font-family: var(--mono);
    font-size: clamp(3rem, 14vw, 7.5rem);
    letter-spacing: 0.02em;
    color: var(--paper);
    font-variant-numeric: tabular-nums;
  }
  .big-date {
    font-family: var(--sans);
    color: var(--paper-dim);
    margin-top: 10px;
    font-size: 1.05rem;
  }
  .back-link {
    margin-top: 40px;
    font-family: var(--mono);
    font-size: 0.8rem;
    text-decoration: none;
    color: var(--paper-faint);
    border: 1px solid var(--line);
    padding: 10px 18px;
    border-radius: var(--radius);
    transition: color 0.2s, background 0.2s;
  }
  .back-link:hover { color: var(--paper); background: var(--panel); }
</style>
</head>
<body>

<main class="clock-screen">
  <p class="eyebrow">Adama, Oromia, Ethiopia · East Africa Time</p>
  <div class="big-clock" id="big-clock" aria-live="polite">--:--:--</div>
  <div class="big-date" id="big-date">—</div>
  <a class="back-link" href="index.html">← Back to portfolio</a>
</main>

<script>
  (function () {
    var clockEl = document.getElementById("big-clock");
    var dateEl = document.getElementById("big-date");

    function update() {
      var now = new Date();
      var time, date;
      try {
        time = new Intl.DateTimeFormat("en-GB", {
          timeZone: "Africa/Addis_Ababa",
          hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
        }).format(now);
        date = new Intl.DateTimeFormat("en-GB", {
          timeZone: "Africa/Addis_Ababa",
          weekday: "long", year: "numeric", month: "long", day: "numeric"
        }).format(now);
      } catch (e) {
        var utc = now.getTime() + now.getTimezoneOffset() * 60000;
        var eat = new Date(utc + 3 * 3600000);
        time = [eat.getHours(), eat.getMinutes(), eat.getSeconds()]
          .map(function (n) { return String(n).padStart(2, "0"); }).join(":");
        date = eat.toDateString();
      }
      clockEl.textContent = time;
      dateEl.textContent = date;
    }

    update();
    setInterval(update, 1000);
  })();
</script>
</body>
</html>
